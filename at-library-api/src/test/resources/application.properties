# Базовый URL Petstore, используется по умолчанию RestAssured'ом
baseURI=https://petstore.swagger.io/v2

# Swagger / OpenAPI ссылки используемых публичных API
api.docs.petstore=https://petstore.swagger.io/
api.docs.fakerest=https://fakerestapi.azurewebsites.net/index.html
api.docs.petstore.v3.openapi=https://petstore3.swagger.io/

# Относительные пути к основным ресурсам Petstore
url.pet=/pet
url.pet.petId=/pet/{petId}
url.store.inventory=/store/inventory
url.pet.findByStatus=/pet/findByStatus

# Публичные absolute-url для расширенных feature-тестов
url.fakerest.activities=https://fakerestapi.azurewebsites.net/api/v1/Activities
url.petstore.v3.openapi.yaml=https://petstore3.swagger.io/api/v3/openapi.yaml

# Пути до JSON-шаблонов тел запросов (для шагов с BODY)
json.post.pet=/restBodies/post_new_pet.json
json.post.pet.vars=/restBodies/post_new_pet_vars.json
json.put.pet=/restBodies/put_update_pet.json

# Простейший JSON для проверки шагов JsonVerificationSteps
json.simple={"answer":"42"}

# Тестовые данные питомца, используемые в JSON-шаблонах и шагах
pet.id=17122019
pet.name=tomas
pet.status=available

# Опциональные proxy параметры для extension-сценариев
proxy.host=
proxy.port=
